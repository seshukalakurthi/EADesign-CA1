apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ca1
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: gateway
          image: ca1/gateway:v2
          imagePullPolicy: Never
          ports:
            - name: http-gateway
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: CHECKOUT_URL
              value: "http://keda-add-ons-http-interceptor-proxy.keda.svc.cluster.local:8080/checkout"
            - name: BACKEND_TIMEOUT_MS
              value: "60000"
            - name: ARCH_LABEL
              value: "nanoservices-kubernetes-keda"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-svc
  namespace: ca1
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: http-gateway